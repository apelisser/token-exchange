server.port: 8090

spring:
  application:
    name: token-exchange
  datasource:
    url: jdbc:h2:mem:tokenexchange;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 123
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true  # Ensures that Hibernate creates the tables before the data.sql
  sql:
    init:
      mode: always